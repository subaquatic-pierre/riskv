site_name: Risk-V
site_description: Structural verification and architecture layout for a 5-stage RISC-V processor in Logisim.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    # - navigation.tabs
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_style: material
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Overview: index.md

  - Architecture:
      - Overview: architecture/index.md
      - Pipeline: architecture/pipeline.md
      - Hazards: architecture/hazards.md

  - CPU Components:
      - Overview: components/index.md

      - Control:
          - Main Control Unit: components/control/main-controller.md
          - Immediate Generator: components/control/immediate-generator.md
          - Hazard Controller: components/control/hazard-controller.md
          - Forwarding Unit: components/control/forward-controller.md # MAKE
          - Branch Control Unit: components/control/branch-controller.md
          - Write Back Controller: components/control/write-back-controller.md # MAKE

      - Arithmetic:
          - ALU: components/arithmetic/alu.md

      - Memory:
          - Register File: components/memory/register-file.md
          - Instruction Memory: components/memory/instruction-memory.md # MAKE
          - Data Memory: components/memory/data-memory.md

      - Pipeline:
          - IF/ID Register: components/pipeline/if-id.md
          - ID/EX Register: components/pipeline/id-ex.md
          - EX/MEM Register: components/pipeline/ex-mem.md
          - MEM/WB Register: components/pipeline/mem-wb.md

  - Digital Design:
      - Overview: digital-design/index.md
      - Truth Tables: digital-design/truth-tables.md
      - Memory: digital-design/memory.md
      - Multiplexers & Demultiplexers: digital-design/multiplexers.md
      - Encoders & Decoders: digital-design/encoders.md
      - Shifter: digital-design/shifter.md
      - Adders: digital-design/adders.md
      - Divider: digital-design/divider.md

  - Development:
      - Building the Project: development/building.md
      - Running in Logisim: development/running.md
      - Testing: development/testing.md
      - Design Conventions: development/design-conventions.md
